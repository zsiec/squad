version: "2"

run:
  timeout: 3m
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*text/tabwriter.Writer).Flush
        - (*os.File).Close
        - (*net.TCPListener).Close
        - (*compress/gzip.Reader).Close
        - (*compress/gzip.Writer).Close
        - (*archive/tar.Reader).Close
        - (*archive/tar.Writer).Close
        - os.Remove
        - os.RemoveAll
    staticcheck:
      checks:
        - all
        - "-S1017"   # bytes.TrimPrefix preference (pre-existing in epics+specs)

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
