version: 2

project_name: squad

before:
  hooks:
    - go mod tidy

builds:
  - id: squad
    main: ./cmd/squad
    binary: squad
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.versionString={{.Version}}

archives:
  - id: squad
    name_template: "squad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: squad
    directory: Formula
    repository:
      owner: zsiec
      name: homebrew-tap
      branch: "release-{{ .Version }}"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          branch: main
    homepage: "https://github.com/zsiec/squad"
    description: "Project-management framework for software work done with AI coding agents"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "squad"
    test: |
      system "#{bin}/squad", "version"
