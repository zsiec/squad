version: 2

project_name: squad

before:
  hooks:
    - go mod tidy

builds:
  - id: squad
    main: ./cmd/squad
    binary: squad
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.versionString={{.Version}}

archives:
  - id: squad
    name_template: "squad_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Phase 14 will add: brews, release notes, signing
